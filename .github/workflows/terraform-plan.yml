name: terraform-plan

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "applications/**"

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: terraform-plan-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
#  qualys_iac_scan:
#    name: Qualys IaC Scan
#    runs-on: ubuntu-latest
#    if: github.event_name == 'pull_request'
#    steps:
#      - name: Checkout
#        uses: actions/checkout@v4
#        with:
#          fetch-depth: 0
#
#      - name: Qualys IaC Scan
#        uses: Qualys/github_action_qiac@main
#        timeout-minutes: 2  # Set 2-minute timeout to prevent hanging
#        continue-on-error: true  # Continue workflow even if scan fails/times out
#        env:
#          URL: ${{ secrets.QUALYS_URL }}
#          UNAME: ${{ secrets.QUALYS_USERNAME }}
#          PASS: ${{ secrets.QUALYS_PASSWORD }}
#        with:
#          policy_name: 'AWS Infrastructure as Code Security Best Practices Policy'
#          directory: "."

  resolve-app:
    runs-on: ubuntu-latest
#    needs: qualys_iac_scan
    outputs:
      app_name: ${{ steps.resolve.outputs.app_name }}
      app_dir: ${{ steps.resolve.outputs.app_dir }}
      region: ${{ steps.resolve.outputs.region }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Resolve app from PR title
        id: resolve
        shell: bash
        run: |
          pr_title="${{ github.event.pull_request.title }}"
          echo "PR Title:"
          echo "$pr_title"

          if [[ "$pr_title" =~ \[Application:([a-zA-Z0-9._-]+)\] ]]; then
            app_name="${BASH_REMATCH[1]}"
          else
            echo "ERROR: PR Title must include application name in the format - [Application:<app-name>]"
            exit 1
          fi

          if [[ "$pr_title" =~ \[Region:([a-zA-Z0-9._-]+)\] ]]; then
            region="${BASH_REMATCH[1]}"
          else
            echo "ERROR: PR Title must include Region details in the format - [Region:<us-east-2/us-east-1>]"
            exit 1
          fi

          app_dir="applications/${app_name}/${region}"

          if [ ! -d "$app_dir" ]; then
            echo "ERROR: Directory not found: $app_dir"
            exit 1
          fi

          echo "app_name=$app_name" >> "$GITHUB_OUTPUT"
          echo "region=$region" >> "$GITHUB_OUTPUT"
          echo "app_dir=$app_dir" >> "$GITHUB_OUTPUT"

  terraform_plan:
    name: Terraform Plan
    needs: resolve-app
    if: needs.resolve-app.outputs.app_name != ''
    environment: non-production
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ${{ needs.resolve-app.outputs.app_dir }}

    env:
      TF_IN_AUTOMATION: "true"
      AWS_REGION: ${{ needs.resolve-app.outputs.region }}
      TFPLAN: ${{ needs.resolve-app.outputs.app_name }}.tfplan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

#      - name: Create GitHub App token
#        id: app-token
#        uses: actions/create-github-app-token@v1
#        with:
#            app-id: ${{ secrets.APP_ID }}
#            private-key: ${{ secrets.APP_PRIVATE_KEY }}
#            github-api-url: https://mnfhs.ghe.com/api/v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.OIDC_ROLE_GITHUB }}
          aws-region: ${{ env.AWS_REGION }}
          audience: "sts.amazonaws.com"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13.1"

#      - name: Configure Git for private module access
#        run: |
#           git config --global credential.helper store
#           echo "https://x-access-token:${{ steps.app-token.outputs.token }}@mnfhs.ghe.com" > ~/.git-credentials
#           git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@mnfhs.ghe.com/".insteadOf "https://mnfhs.ghe.com/"

#          echo "https://${{ secrets.REPO_ACCESS_TOKEN }}:x-oauth-basic@mnfhs.ghe.com" > ~/.git-credentials
#          git config --global url."https://${{ secrets.REPO_ACCESS_TOKEN }}:x-oauth-basic@mnfhs.ghe.com/".insteadOf "https://mnfhs.ghe.com/"
#        env:
#          REPO_ACCESS_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Terraform fmt (check only)
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      #      - name: Switch to Git Reference for Code Pinning
#        run: |
#          # Replace relative path with git reference for CI/CD code pinning
#          sed -i 's|source = "../../../../../v2-modules/ec2"|source = "git::https://mnfhs.ghe.com/Fairview-HealthServices/fhs-iac-terraform-modules.git//modules/ec2?ref=v1.0.0"|' main.tf
#          echo "✅ Switched to git reference for code pinning"

      - name: Terraform Init
        id: init
        run: |
          terraform init -input=false -no-color 2>&1 | tee init.txt

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color 2>&1 | tee validate.txt
        continue-on-error: true

      - name: Check Validation Result
        if: steps.validate.outcome == 'failure'
        run: |
          echo "::error::Terraform validation failed"
          cat validate.txt
          exit 1

      - name: Terraform Plan
        id: tfplan
        if: steps.validate.outcome == 'success'
        run: |
            set +e
             TFVARS_FILE=$(ls *.tfvars 2>/dev/null | head -1)
    
             if [ -z "$TFVARS_FILE" ]; then
                echo "::error::No .tfvars file found in $(pwd)"
                ls -la
                exit 1
             fi 
             echo "Using tfvars file: $TFVARS_FILE"
          
            terraform plan -input=false -no-color -detailed-exitcode -lock=false -var-file="$TFVARS_FILE" -out=$TFPLAN 2>&1 | tee plan.txt
            exit_code=$?
            terraform show -json $TFPLAN > plan.json
            set -e
                
            echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          
            # Show the plan output for debugging
            # cat plan.txt
            
            if [ "$exit_code" -eq 0 ]; then
              echo "status=✅ No changes" >> "$GITHUB_OUTPUT"
            elif [ "$exit_code" -eq 2 ]; then
              echo "status=📝 Changes detected" >> "$GITHUB_OUTPUT"
            else
              echo "status=❌ Plan failed" >> "$GITHUB_OUTPUT"
            fi

      - name: Unlock on Failure
        if: failure()
        continue-on-error: true
        run: |
            # Try to extract lock ID from plan output
            LOCK_ID=$(grep -oP 'ID:\s+\K[a-f0-9-]+' plan.txt 2>/dev/null | head -1)
            if [ ! -z "$LOCK_ID" ]; then
              echo "Attempting to unlock state with ID: $LOCK_ID"
              terraform force-unlock -force "$LOCK_ID"
            fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Generate Enhanced Terraform Summary
        id: summary
        run: |
          python3 <<EOF > summary.txt
          import json
          
          with open("plan.json") as f:
            data = json.load(f)
          
          sections = {
            "create": {"instances": {}, "volumes": [], "security_groups": [], "load_balancers": [], "s3_buckets": []},
            "update": {"instances": {}, "volumes": [], "security_groups": [], "load_balancers": [], "s3_buckets": []},
            "delete": {"instances": {}, "volumes": [], "security_groups": [], "load_balancers": [], "s3_buckets": []},
            "replace": {"instances": {}, "volumes": [], "security_groups": [], "load_balancers": [], "s3_buckets": []},
          }
          
          def classify_action(actions):
            if actions == ["create"]:
              return "create"
            elif actions == ["update"]:
              return "update"
            elif actions == ["delete"]:
              return "delete"
            elif actions in [["delete","create"], ["create","delete"]]:
              return "replace"
            return None
          
          for r in data["resource_changes"]:
            action = classify_action(r["change"]["actions"])
            if not action:
              continue
            
            rtype = r["type"]
            before = r["change"].get("before", {})
            after = r["change"].get("after", {})
            target = sections[action]
            
            # ---------------------------------------------------
            # EC2 Instances
            # ---------------------------------------------------
            if rtype == "aws_instance":
              name = after.get("tags", {}).get("Name") or before.get("tags", {}).get("Name") or r["name"]
              
              instance_type_before = before.get("instance_type", "unknown")
              instance_type_after = after.get("instance_type", "unknown")
              
              sg_ids = after.get("vpc_security_group_ids", []) or before.get("vpc_security_group_ids", [])
              
              target["instances"][name] = {
                "instance_type": instance_type_after,
                "instance_type_before": instance_type_before,
                "volumes": [],
                "security_groups": sg_ids
              }
            
            # ---------------------------------------------------
            # EBS Volumes
            # ---------------------------------------------------
            elif rtype == "aws_ebs_volume":
              vol_name = r.get("index", r["name"])
              size = after.get("size") or before.get("size") or "?"
              vtype = after.get("type") or before.get("type") or "gp3"
              
              target["volumes"].append({
                "name": vol_name,
                "size": size,
                "type": vtype
              })
            
            # ---------------------------------------------------
            # Skip volume attachments
            # ---------------------------------------------------
            elif rtype == "aws_volume_attachment":
              continue
            
            # ---------------------------------------------------
            # Security Groups
            # ---------------------------------------------------
            elif rtype == "aws_security_group":
              sg_id = after.get("id") or before.get("id") or r["name"]
              sg_name = after.get("name") or before.get("name") or r["name"]
              
              target["security_groups"].append({
                "id": sg_id,
                "name": sg_name
              })
            
            # ---------------------------------------------------
            # Load Balancers
            # ---------------------------------------------------
            elif rtype == "aws_lb":
              name = after.get("name") or before.get("name") or r["name"]
              lb_type = after.get("load_balancer_type") or before.get("load_balancer_type") or "unknown"
              internal = after.get("internal")
              if internal is None:
                internal = before.get("internal", False)
              
              target["load_balancers"].append({
                "name": name,
                "type": lb_type,
                "scheme": "internal" if internal else "internet-facing"
              })
            
            # ---------------------------------------------------
            # S3 Buckets
            # ---------------------------------------------------
            elif rtype == "aws_s3_bucket":
              name = after.get("bucket") or before.get("bucket") or r["name"]
              acl = after.get("acl") or before.get("acl") or "private"
              
              target["s3_buckets"].append({
                "name": name,
                "acl": acl
              })
          
          # ---------------------------------------------------
          # Match EBS to EC2
          # ---------------------------------------------------
          for section in sections.values():
            for vol in section["volumes"]:
              for inst in section["instances"]:
                if vol["name"].startswith(inst):
                  section["instances"][inst]["volumes"].append(vol)
          
          # ---------------------------------------------------
          # Resolve SG names into EC2
          # ---------------------------------------------------
          for section in sections.values():
            sg_lookup = {sg["id"]: sg["name"] for sg in section["security_groups"]}
          
            for inst in section["instances"].values():
              resolved_sgs = []
              for sgid in inst["security_groups"]:
                resolved_sgs.append(sg_lookup.get(sgid, sgid))
              inst["security_groups"] = resolved_sgs
          
          # ---------------------------------------------------
          # Print section helper
          # ---------------------------------------------------
          def print_section(title, emoji, data, danger=False):
            has_content = any([
              data["instances"],
              data["load_balancers"],
              data["s3_buckets"]
            ])
            if not has_content:
              return
          
            print(f"{emoji} {title}:\n")
          
            if data["instances"]:
              print("EC2 Instances:")
              for inst, details in data["instances"].items():
                suffix = " 🚨" if danger else ""
                print(f"- EC2 Instance {inst} ({details['instance_type']}){suffix}")
                
                # Update diff
                if title == "Resources to Modify":
                  if details["instance_type_before"] != details["instance_type"]:
                    print(f" instance_type: {details['instance_type_before']} → {details['instance_type']}")
                
                # SGs
                for sg in details["security_groups"]:
                  print(f" ├─ Security Group {sg}")
                
                # EBS
                for vol in details["volumes"]:
                  short_name = vol["name"].replace(inst + "-", "").split("-_")[0]
                  print(f" └─ EBS Volume {short_name} ({vol['size']} GB {vol['type']})")
                
                print()
          
            if data["load_balancers"]:
              print("Load Balancers:")
              for lb in data["load_balancers"]:
                suffix = " 🚨" if danger else ""
                print(f"- Load Balancer {lb['name']} ({lb['type']}, {lb['scheme']}){suffix}")
              print()
          
            if data["s3_buckets"]:
              print("S3 Buckets:")
              for s3 in data["s3_buckets"]:
                suffix = " 🚨" if danger else ""
                print(f"- S3 Bucket {s3['name']} ({s3['acl']}){suffix}")
            print()
          
          print("### Terraform Plan Summary\n")
          
          print_section("Resources to Create", "➕", sections["create"])
          print_section("Resources to Modify", "✏️", sections["update"])
          print_section("Resources to Destroy", "❌", sections["delete"], True)
          print_section("Resources to Replace", "🔁", sections["replace"], True)
          
          EOF


