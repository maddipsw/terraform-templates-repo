name: terraform-plan

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "applications/**"

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: terraform-plan-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
#  qualys_iac_scan:
#    name: Qualys IaC Scan
#    runs-on: ubuntu-latest
#    if: github.event_name == 'pull_request'
#    steps:
#      - name: Checkout
#        uses: actions/checkout@v4
#        with:
#          fetch-depth: 0
#
#      - name: Qualys IaC Scan
#        uses: Qualys/github_action_qiac@main
#        timeout-minutes: 2  # Set 2-minute timeout to prevent hanging
#        continue-on-error: true  # Continue workflow even if scan fails/times out
#        env:
#          URL: ${{ secrets.QUALYS_URL }}
#          UNAME: ${{ secrets.QUALYS_USERNAME }}
#          PASS: ${{ secrets.QUALYS_PASSWORD }}
#        with:
#          policy_name: 'AWS Infrastructure as Code Security Best Practices Policy'
#          directory: "."

  resolve-app:
    runs-on: ubuntu-latest
#    needs: qualys_iac_scan
    outputs:
      app_name: ${{ steps.resolve.outputs.app_name }}
      app_dir: ${{ steps.resolve.outputs.app_dir }}
      region: ${{ steps.resolve.outputs.region }}
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Resolve app from PR title
        id: resolve
        shell: bash
        run: |
          pr_title="${{ github.event.pull_request.title }}"
          echo "PR Title:"
          echo "$pr_title"

          if [[ "$pr_title" =~ \[Application:([a-zA-Z0-9._-]+)\] ]]; then
            app_name="${BASH_REMATCH[1]}"
          else
            echo "ERROR: PR Title must include application name in the format - [Application:<app-name>]"
            exit 1
          fi

          if [[ "$pr_title" =~ \[Region:([a-zA-Z0-9._-]+)\] ]]; then
            region="${BASH_REMATCH[1]}"
          else
            echo "ERROR: PR Title must include Region details in the format - [Region:<us-east-2/us-east-1>]"
            exit 1
          fi

          app_dir="applications/${app_name}/${region}"

          if [ ! -d "$app_dir" ]; then
            echo "ERROR: Directory not found: $app_dir"
            exit 1
          fi

          echo "app_name=$app_name" >> "$GITHUB_OUTPUT"
          echo "region=$region" >> "$GITHUB_OUTPUT"
          echo "app_dir=$app_dir" >> "$GITHUB_OUTPUT"

  terraform_plan:
    name: Terraform Plan
    needs: resolve-app
    if: needs.resolve-app.outputs.app_name != ''
    environment: non-production
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: ${{ needs.resolve-app.outputs.app_dir }}

    env:
      TF_IN_AUTOMATION: "true"
      AWS_REGION: ${{ needs.resolve-app.outputs.region }}
      TFPLAN: ${{ needs.resolve-app.outputs.app_name }}.tfplan
#      TF_VAR_AWS_REGION: ${{ needs.resolve-app.outputs.region }}
#      TF_VAR_key_name: ${{ vars.KEY_NAME }}
#      TF_VAR_iam_instance_profile: ${{ vars.IAM_INSTANCE_PROFILE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

#      - name: Create GitHub App token
#        id: app-token
#        uses: actions/create-github-app-token@v1
#        with:
#            app-id: ${{ secrets.APP_ID }}
#            private-key: ${{ secrets.APP_PRIVATE_KEY }}
#            github-api-url: https://mnfhs.ghe.com/api/v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.OIDC_ROLE_GITHUB }}
          aws-region: ${{ env.AWS_REGION }}
          audience: "sts.amazonaws.com"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13.1"

#      - name: Configure Git for private module access
#        run: |
#           git config --global credential.helper store
#           echo "https://x-access-token:${{ steps.app-token.outputs.token }}@mnfhs.ghe.com" > ~/.git-credentials
#           git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@mnfhs.ghe.com/".insteadOf "https://mnfhs.ghe.com/"

#          echo "https://${{ secrets.REPO_ACCESS_TOKEN }}:x-oauth-basic@mnfhs.ghe.com" > ~/.git-credentials
#          git config --global url."https://${{ secrets.REPO_ACCESS_TOKEN }}:x-oauth-basic@mnfhs.ghe.com/".insteadOf "https://mnfhs.ghe.com/"
#        env:
#          REPO_ACCESS_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Terraform fmt (check only)
        run: terraform fmt -check -recursive

#      - name: Switch to Git Reference for Code Pinning
#        run: |
#          # Replace relative path with git reference for CI/CD code pinning
#          sed -i 's|source = "../../../../../v2-modules/ec2"|source = "git::https://mnfhs.ghe.com/Fairview-HealthServices/fhs-iac-terraform-modules.git//modules/ec2?ref=v1.0.0"|' main.tf
#          echo "✅ Switched to git reference for code pinning"

      - name: Terraform Init
        run: terraform init -input=false -no-color

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: tfplan
        run: |
            set +e
            pwd
            terraform plan -input=false -no-color -detailed-exitcode -out=$TFPLAN > plan.txt 2>&1
            exit_code=$?
            set -e
                
            echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
            
            if [ "$exit_code" -eq 0 ]; then
            echo "status=No changes" >> "$GITHUB_OUTPUT"
            elif [ "$exit_code" -eq 2 ]; then
            echo "status=Changes detected" >> "$GITHUB_OUTPUT"
            else
            echo "status=Plan failed" >> "$GITHUB_OUTPUT"
            fi

      - name: Unlock on Failure
        if: steps.tfplan.outcome == 'failure'
        run: terraform force-unlock -force $(terraform show -json | jq -r .lock_id) || true

      - name: Build PR comment
        id: comment
        run: |
                {
                  echo 'body<<EOF'
                  echo "<!-- terraform-plan:${{ needs.resolve-app.outputs.app_name }} -->"
                  echo "## Terraform plan - ${{ needs.resolve-app.outputs.app_name }}"
                  echo ""
                  echo "- Status: **${{ steps.tfplan.outputs.status }}**"
                  echo "- Directory: \`${{ needs.resolve-app.outputs.app_dir }}\`"
                  echo "- Commit: \`${{ github.event.pull_request.head.sha }}\`"
                  echo ""
                  echo "<details><summary>Show plan output</summary>"
                  echo ""
                  echo '```text'
                  sed -n '1,60000p' plan.txt
                  echo '```'
                  echo ""
                  echo "</details>"
                  echo 'EOF'
                } >> "$GITHUB_OUTPUT"

      - name: Find existing sticky comment
        id: find_comment
        uses: peter-evans/find-comment@v3
        with:
             issue-number: ${{ github.event.pull_request.number }}
             comment-author: "github-actions[bot]"
             body-includes: "<!-- terraform-plan:${{ needs.resolve-app.outputs.app_name }} -->"

      - name: Create or update sticky comment
        uses: peter-evans/create-or-update-comment@v4
        with:
             issue-number: ${{ github.event.pull_request.number }}
             comment-id: ${{ steps.find_comment.outputs.comment-id }}
             body: ${{ steps.comment.outputs.body }}
             edit-mode: replace

      - name: Fail workflow if plan failed
        if: steps.tfplan.outputs.exit_code == '1'
        run: exit 1

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: ${{ needs.resolve-app.outputs.app_dir }}/${{ needs.resolve-app.outputs.app_name }}.tfplan
          retention-days: 5

