name: terraform-plan

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "applications/**"

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: terraform-plan-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
#  qualys_iac_scan:
#    name: Qualys IaC Scan
