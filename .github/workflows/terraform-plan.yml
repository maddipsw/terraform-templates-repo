      - name: Find existing comment
        id: find_comment
        uses: peter-evans/find-comment@v3
        with:
            issue-number: ${{ github.event.pull_request.number }}
            comment-author: "github-actions[bot]"
            body-includes: "<!-- terraform-plan:${{ needs.resolve-app.outputs.app_name }} -->"

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v4
        with:
            issue-number: ${{ github.event.pull_request.number }}
            comment-id: ${{ steps.find_comment.outputs.comment-id }}
            body: ${{ steps.summary.outputs.summary }}
            edit-mode: replace

      - name: Fail workflow if validation or plan failed
        if: steps.validate.outcome == 'failure' || steps.tfplan.outputs.exit_code == '1'
        run: |
              if [ "${{ steps.validate.outcome }}" = "failure" ]; then
                echo "::error::Terraform validation failed"
              fi
              if [ "${{ steps.tfplan.outputs.exit_code }}" = "1" ]; then
                echo "::error::Terraform plan failed"
              fi
              exit 1

      - name: Upload Terraform Plan
        if: steps.tfplan.outputs.exit_code == '2'
        uses: actions/upload-artifact@v4
        with:
            name: terraform-plan-${{ needs.resolve-app.outputs.app_name }}
            path: ${{ needs.resolve-app.outputs.app_dir }}/${{ env.TFPLAN }}
            retention-days: 5
