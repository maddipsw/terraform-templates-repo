name: terraform-destroy

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      app_name:
        description: 'Enter the Application Name'
        required: true
        type: string

      aws_region:
        description: "Enter the AWS region on which Infra is provisioned"
        required: true
        default: "us-east-2"
        type: string

      app_directory:
        description: "Specify the folder path containing the .tfvars file"
        required: true
        type: string
        default: "applications/app-name/ec2/aws-region"

      confirm_destroy:
         description: 'Type YES to confirm terraform destroy'
         required: true
         type: string

permissions:
  contents: read
  id-token: write

jobs:
  terraform-destroy-plan:
    name: Terraform Destroy Plan
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    env:
      TF_IN_AUTOMATION: "true"
      TFPLAN: ${{ inputs.app_name }}.tfplan

    steps:
      - name: Validate Confirmation
        run: |
          if [ "${{ inputs.confirm_destroy }}" != "YES" ]; then
            echo "Destroy not confirmed. Exiting."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.OIDC_ROLE_GITHUB }}
          aws-region: ${{ inputs.aws_region }}
          audience: "sts.amazonaws.com"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13.1"

      - name: Terraform fmt (check only)
        working-directory: ${{ inputs.app_directory }}
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ${{ inputs.app_directory }}
        run: terraform init -input=false -no-color

      - name: Terraform Validate
        working-directory: ${{ inputs.app_directory }}
        run: terraform validate -no-color

      - name: terraform-plan
        working-directory: ${{ inputs.app_directory }}
        run: terraform plan -destroy -no-color -input=false -out="${{ env.TFPLAN }}" -target=module.ec2 -var-file="${{ inputs.app_name }}.tfvars"

      - name: Generate Destroy Summary
        working-directory: ${{ inputs.app_directory }}
        run: |
          ls -lah
          test -f "${{ env.TFPLAN }}"
          terraform show -json "${{ env.TFPLAN }}" > plan.json
          
          echo "###  Resources to be DESTROYED" > summary.md
          
          jq -r '
            .resource_changes[]
            | select(.change.actions | index("delete"))
            | .change.before as $b
            | "- Name: \($b.tags.Name // "N/A")
              - Instance ID: \($b.id // "N/A")
              - Instance Type: \($b.instance_type // "N/A")
              - AZ: \($b.availability_zone // "N/A")
              - Private IP: \($b.private_ip // "N/A")
              - Subnet ID: \($b.subnet_id // "N/A")"
          ' plan.json >> summary.md

          cat summary.md

      - name: Publish Destroy Summary
        working-directory: ${{ inputs.app_directory }}
        run: |
          echo "## Terraform Destroy Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: |
            ${{ inputs.app_directory }}/${{ env.TFPLAN }}
            ${{ inputs.app_directory }}/summary.md
          if-no-files-found: error


  terraform-destroy-apply:
    name: Terraform Destroy Apply
    runs-on: ubuntu-latest
    needs: terraform-destroy-plan
    env:
      TF_IN_AUTOMATION: "true"
      TFPLAN: ${{ inputs.app_name }}.tfplan
    concurrency:
      group: terraform-destroy-${{ inputs.app_name }}
      cancel-in-progress: false
    environment: terraform-destroy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Plan Artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ inputs.app_directory }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.OIDC_ROLE_GITHUB }}
          aws-region: ${{ inputs.aws_region }}
          audience: "sts.amazonaws.com"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.13.1"

      - name: Terraform Init
        working-directory: ${{ inputs.app_directory }}
        run: terraform init -input=false -no-color

      - name: Terraform Validate
        working-directory: ${{ inputs.app_directory }}
        run: terraform validate -no-color

      - name: Disable termination protection on EC2 instances
        working-directory: ${{ inputs.app_directory }}
        run: |
                 set -euo pipefail
                 
                 INSTANCE_IDS=$(terraform state pull | jq -r '
                   .resources[]
                   | select(.module == "module.ec2")
                   | select(.type == "aws_instance")
                   | .instances[]
                   | .attributes.id
                 ' | sort -u)
                 
                 if [ -z "$INSTANCE_IDS" ]; then
                   echo "No EC2 instances found in module.ec2"
                   exit 0
                 fi
          
                 INSTANCE_IDS_ONE_LINE=$(echo "$INSTANCE_IDS" | xargs)
                 echo "OLD_INSTANCE_IDS=$INSTANCE_IDS_ONE_LINE" >> "$GITHUB_ENV"
                 echo "Instances before destroy: $INSTANCE_IDS_ONE_LINE"
                 
                 for id in $INSTANCE_IDS_ONE_LINE; do
                   echo "Disabling termination protection for $id"
                   aws ec2 modify-instance-attribute \
                     --instance-id "$id" \
                     --no-disable-api-termination \
                     --region "${{ inputs.aws_region }}"
                 done  

      - name: Terraform Apply (Destroy)
        working-directory: ${{ inputs.app_directory }}
        run: terraform apply -no-color -input=false -auto-approve "${{ env.TFPLAN }}"

      - name: Capture post-destroy instance IDs
        working-directory: ${{ inputs.app_directory }}
        run: |
          NEW=$(terraform state list | grep module.ec2.aws_instance || true)
          echo "Instances after destroy: $NEW"
